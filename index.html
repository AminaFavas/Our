<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Favas & Amina Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
    --maroon: #630d0d;
    --cream: #fffdf5;
    --petal-pink: #ffb6c1;
    --sparkle-gold: #ffdf00;
    --vellum: rgba(255, 255, 255, 0.9);
    --flower-img: url('https://i.postimg.cc/J72VLGr6/1000124382.png');
}

/* --- BODY & CARD --- */
body, html {
    margin: 0; padding: 0;
    height: 100%; width: 100%;
    background-color: #f4f1ea;
    display: flex; justify-content: center; align-items: center;
    overflow: hidden;
    font-family: 'Playfair Display', serif;
}

/* --- SPARKLES & PETALS --- */
#fx-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 100; }
.particle { position: absolute; animation: fall linear forwards; }
.glitter { background: white; border-radius: 50%; box-shadow: 0 0 10px var(--sparkle-gold); animation: fall linear forwards, twinkle 0.8s infinite alternate; }
.petal-pink { background: var(--petal-pink); border-radius: 50% 0 50% 50%; transform: rotate(45deg); }
.petal-maroon { background: var(--maroon); border-radius: 50% 0 50% 50%; transform: rotate(-15deg); }

@keyframes fall { 0%{transform:translateY(-10vh) rotate(0deg);opacity:0;} 10%{opacity:1;} 100%{transform:translateY(110vh) rotate(360deg);opacity:0;} }
@keyframes twinkle { from{opacity:0.3;transform:scale(0.6);} to{opacity:1;transform:scale(1.1);} }

/* --- INVITATION CARD --- */
.invitation-wrapper {
    position: relative; width: 92vw; max-width: 380px; height: 85vh; max-height: 660px;
    background: var(--cream); box-shadow: 0 20px 40px rgba(0,0,0,0.15); border-radius: 12px;
    overflow: hidden; perspective: 2000px;
}
.inner-content {
    position: absolute; width: 100%; height: 100%;
    background-image: url("https://www.transparenttextures.com/patterns/p6.png");
    display: flex; flex-direction: column; align-items: center; text-align: center; z-index: 1;
    opacity: 0; transition: opacity 1.5s ease;
}
.is-open .inner-content { opacity: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

/* --- FLAPS --- */
.flap { position: absolute; top: 0; height: 100%; width: 50.2%; background: var(--vellum); backdrop-filter: blur(8px); z-index: 10; transition: transform 2.8s cubic-bezier(0.4,0,0.2,1), opacity 2s; }
.flap-left { left: 0; transform-origin: left; border-right: 1px solid rgba(0,0,0,0.05); }
.flap-right { right: 0; transform-origin: right; border-left: 1px solid rgba(0,0,0,0.05); }

/* --- FLOWERS --- */
.flowers { position: absolute; bottom: 0; width: 380px; height: 180px; background-image: var(--flower-img); background-size: contain; background-repeat: no-repeat; }
.flap-left .flowers { left: 0; background-position: left bottom; }
.flap-right .flowers { right: 0; background-position: right bottom; }

/* --- NAMES (keep Gabriola) --- */
.names { font-family: 'Gabriola', cursive; color: var(--maroon); font-size: 4rem; margin: 80px 0 10px 0; line-height: 0.8; animation: fadeInDown 1.5s ease forwards; }

/* --- DANCING SCRIPT FOR ALL OTHER TEXT --- */
.dancing-text { font-family: 'Dancing Script', cursive; color: #333; }

/* --- REVEAL TEXT --- */
.reveal-text { opacity: 0; transform: translateY(20px); transition: all 1s ease; margin: 20px 0; }
.is-open .reveal-text { opacity: 1; transform: translateY(0); }

/* --- MAP BUTTON --- */
.map-btn { display: inline-block; padding: 14px 35px; background: var(--maroon); color: #fff; text-decoration: none; border-radius: 40px; font-weight: bold; font-size: 0.85rem; font-family:'Playfair Display', serif; letter-spacing: 1px; box-shadow: 0 4px 10px rgba(99,13,13,0.3); text-transform: uppercase; }

@keyframes fadeInDown { from{opacity:0; transform:translateY(-30px);} to{opacity:1; transform:translateY(0);} }

.inner-flower-footer { width: 100%; height: 160px; background-image: var(--flower-img); background-size: contain; background-repeat: no-repeat; background-position: center bottom; flex-shrink: 0; margin-top: 40px; }

.seal { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 70px; height: 70px; background: #fff; border-radius: 50%; z-index: 20; display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
.is-open .flap-left { transform: rotateY(-130deg); opacity: 0; }
.is-open .flap-right { transform: rotateY(130deg); opacity: 0; }
.is-open .seal { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<div id="fx-container"></div>

<div class="invitation-wrapper" id="invite">
    <div class="inner-content">
        <h1 class="names">Favas<br>&<br>Amina</h1>

        <div class="reveal-text" style="transition-delay:0.5s;">
            <p class="dancing-text" style="letter-spacing: 2px; font-size: 0.95rem; font-weight:bold;">Together with our family</p>
            <p class="dancing-text" style="font-size:1.15rem; padding:0 25px; line-height:1.5;">
                We invite you to share in the joy as we begin our beautiful journey together.
            </p>
        </div>

        <div class="reveal-text" style="transition-delay:0.8s;">
            <div style="width:100px; border-top:1px solid #d4af37; margin:20px auto;"></div>
            <h2 class="dancing-text" style="color:var(--maroon); font-size:2.1rem; margin:10px 0;">12 April 2026</h2>
            <p class="dancing-text" style="font-size:1.5rem; margin:0;">11:00 am</p>
        </div>

        <div class="reveal-text" style="transition-delay:1.1s; margin-top:30px;">
            <p class="dancing-text" style="text-transform: lowercase; letter-spacing: 3px; font-size: 1.8rem; color:#888;">At</p>
            <h3 class="dancing-text" style="color: var(--maroon); font-size: 1.5rem; margin: 5px 0;">Vrindavanam Convention Centre
           <h3 class="dancing-text" style="color: var(--maroon); font-size: 1.5rem; margin: 5px 0;"> (Lotus Hall)
            </h3>
            <p class="dancing-text" style="color: var(--maroon); font-style:italicfont-size: 1.5rem; margin: 5px 0;">Palode</p>
        </div>

        <div class="reveal-text" style="transition-delay:1.7s; margin-top:40px; padding:0 20px;">
            <p class="dancing-text" style="font-size:1.1rem; color:var(--maroon); border-top:1px solid rgba(212,175,55,0.3); border-bottom:1px solid rgba(212,175,55,0.3); padding:10px 0; font-style: italic;">
                Join us with your prayers and blessings
            </p>
        </div>

        <div class="reveal-text" style="transition-delay:1.4s; margin-top:30px;">
            <a href="https://maps.google.com/?q=Vrindhavanam+Convention+Center+Palode" target="_blank" class="map-btn">
                📍 OPEN IN GOOGLE MAP
            </a>
        </div>

        <div class="inner-flower-footer"></div>
    </div>

    <div class="flap flap-left" id="fL"><div class="flowers"></div></div>
    <div class="flap flap-right" id="fR"><div class="flowers"></div></div>
    
    <div class="seal" id="s1" onclick="document.getElementById('invite').classList.add('is-open')">
        <span style="font-size: 25px; color: #ccc;">🌿</span>
    </div>
</div>

<<script>
let particleInterval;
const invite = document.getElementById('invite');

function createParticle() {
    const container = document.getElementById('fx-container');
    const p = document.createElement('div');
    const rand = Math.random();
    p.className = 'particle';
    
    if(rand > 0.7){ 
        p.classList.add('glitter'); 
        p.style.width = p.style.height = (Math.random()*3 + 2)+'px'; 
    } else if(rand > 0.35){ 
        p.classList.add('petal-pink'); 
        p.style.width = p.style.height = (Math.random()*10 + 6)+'px'; 
    } else { 
        p.classList.add('petal-maroon'); 
        p.style.width = p.style.height = (Math.random()*8 + 8)+'px'; 
    }

    p.style.left = Math.random()*100+'vw';
    p.style.animationDuration = (Math.random()*4 + 4)+'s';
    container.appendChild(p);
    setTimeout(()=>p.remove(), 8000);
}

// Start with front page: more petals
particleInterval = setInterval(createParticle, 150); // faster = more petals

// When invitation opens, reduce petals
invite.addEventListener('transitionend', () => {
    if(invite.classList.contains('is-open')) {
        clearInterval(particleInterval);
        // restart with fewer petals
        particleInterval = setInterval(createParticle, 1000); // slower = fewer petals
    }
});
</script>

</body>
</html>
